<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据沙箱平台 - 模型注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden bg-[#f0f2f5] text-[14px] text-gray-700">
    <!-- 顶部导航栏 -->
    <header class="h-14 bg-[#1c7ffd] flex justify-between items-center px-6 text-white shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-cubes-stacked text-2xl"></i>
            <span class="text-lg font-medium tracking-wider ml-1">数据沙箱平台</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="relative cursor-pointer hover:text-gray-200 transition-colors" onclick="window.location.href=\'my_messages.html\'">
                <i class="fa-regular fa-bell text-xl"></i>
                <span class="absolute -top-1.5 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-[#1c7ffd] leading-none">20</span>
            </div>
            <div class="flex items-center gap-2 cursor-pointer hover:text-gray-200 transition-colors">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=yiyun&backgroundColor=b6e3f4" alt="avatar" class="w-8 h-8 rounded-full border border-blue-300 bg-white">
                <span>yiyun</span>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <div class="flex-1 flex overflow-hidden">
<!-- 左侧导航 -->
<aside class="w-[220px] bg-white border-r border-gray-200 shrink-0 overflow-y-auto">
    <div id="developer-side-nav" class="py-4"></div>
</aside>

<script src="./developer_nav.js"></script>

<!-- 右侧内容区 -->
        <main class="flex-1 flex flex-col overflow-hidden relative">
            <div id="developer-top-nav" class="h-[52px] bg-white border-b border-gray-200 px-6 flex items-center gap-2 shrink-0 overflow-x-auto"></div>

            <div class="px-6 py-3 bg-white border-b border-gray-100 flex items-center shrink-0">
                <a href="model_deploy_list.html?nav=model-register" class="text-[#1c7ffd] hover:opacity-80 transition-colors flex items-center gap-1 font-medium text-[15px]">
                    <i class="fa-solid fa-arrow-rotate-left"></i> 返回列表
                </a>
            </div>

            <div class="flex-1 p-6 pb-[88px] overflow-hidden">
                <div class="bg-white rounded-lg shadow-sm border border-gray-100 h-full flex flex-col overflow-hidden">
                <!-- 步骤条 -->
                    <div class="py-8 px-20 shrink-0">
                        <div class="flex items-center justify-between relative">
                            <!-- 连线 -->
                            <div class="absolute left-[10%] right-[10%] h-[1px] bg-gray-200 top-1/2 -translate-y-1/2 z-0"></div>
                            
                            <!-- 步骤1 -->
                            <div class="relative z-10 flex items-center bg-white px-2">
                                <div class="w-8 h-8 rounded-full bg-[#1c7ffd] text-white flex items-center justify-center font-bold">1</div>
                                <span class="ml-3 text-[#303133] font-medium">模型信息配置</span>
                            </div>

                            <!-- 步骤2 -->
                            <div class="relative z-10 flex items-center bg-white px-2">
                                <div class="w-8 h-8 rounded-full border border-gray-300 text-gray-400 bg-white flex items-center justify-center font-bold">2</div>
                                <span class="ml-3 text-gray-400">接口信息配置</span>
                            </div>

                            <!-- 步骤3 -->
                            <div class="relative z-10 flex items-center bg-white px-2">
                                <div class="w-8 h-8 rounded-full border border-gray-300 text-gray-400 bg-white flex items-center justify-center font-bold">3</div>
                                <span class="ml-3 text-gray-400">接口测试</span>
                            </div>
                        </div>
                    </div>

                    <!-- 表单区 (图2、图3) -->
                    <div class="flex-1 overflow-y-auto px-6 pb-6 flex justify-center">
                        <div class="w-full max-w-[800px] flex flex-col gap-6 pt-4">
                            <!-- 行 -->
                            <div class="flex items-center">
                                <label class="w-[160px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>模型名称：</label>
                                <input type="text" placeholder="请输入" class="ml-4 flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] placeholder-gray-300">
                            </div>

                            <div class="flex items-center">
                                <label class="w-[160px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>任务名称：</label>
                                <div class="ml-4 flex-1 relative">
                                    <select id="taskSelect" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] text-gray-400 appearance-none bg-white" onchange="onTaskSelected(this.value)">
                                        <option value="">请输入</option>
                                        <option value="task1">zh测试任务_0310</option>
                                        <option value="task2">公积金数据任务_0815</option>
                                    </select>
                                    <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-300 pointer-events-none"></i>
                                </div>
                            </div>

                            <div class="flex items-center">
                                <label class="w-[160px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>镜像名称：</label>
                                <div class="ml-4 flex-1 relative">
                                    <select id="imageSelect" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] text-gray-400 appearance-none bg-white bg-gray-50/50" disabled>
                                        <option value="">请先选择任务名称</option>
                                    </select>
                                    <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-300 pointer-events-none"></i>
                                </div>
                            </div>

                            <div class="flex items-center">
                                <label class="w-[160px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>cpu限制（Core）：</label>
                                <input type="text" placeholder="cpu限制：0.1-0.3，精确到小数点后一位" class="ml-4 flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] placeholder-gray-300">
                            </div>

                            <div class="flex items-center">
                                <label class="w-[160px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>cpu预留（Core）：</label>
                                <input type="text" placeholder="cpu预留：0.1-0.3，精确到小数点后一位" class="ml-4 flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] placeholder-gray-300">
                            </div>

                            <div class="flex items-center">
                                <label class="w-[160px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>内存限制（Mi）：</label>
                                <input type="text" placeholder="内存限制：128-2048" class="ml-4 flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] placeholder-gray-300">
                            </div>

                            <div class="flex items-center">
                                <label class="w-[160px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>内存预留（Mi）：</label>
                                <input type="text" placeholder="内存预留值：128-2048" class="ml-4 flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] placeholder-gray-300">
                            </div>

                            <div class="flex items-center">
                                <label class="w-[160px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>容器端口号：</label>
                                <input type="text" placeholder="请输入" class="ml-4 flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] placeholder-gray-300">
                            </div>

                            <div class="flex items-center">
                                <label class="w-[160px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>模型所属方：</label>
                                <input type="text" value="山东亿云信息技术有限公司" class="ml-4 flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] bg-gray-50/50 text-gray-500">
                            </div>

                            <div class="flex items-center">
                                <label class="w-[160px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>是否对外使用：</label>
                                <div class="ml-4 flex-1 flex items-center gap-6">
                                    <label class="flex items-center gap-2 cursor-pointer group">
                                        <div class="relative flex items-center">
                                            <input type="radio" name="isExternal" class="peer sr-only" checked>
                                            <div class="w-4 h-4 rounded-full border border-gray-300 peer-checked:border-[#1c7ffd] peer-checked:border-[4px] transition-all bg-white group-hover:border-[#1c7ffd]"></div>
                                        </div>
                                        <span class="text-sm text-[#303133]">是</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer group">
                                        <div class="relative flex items-center">
                                            <input type="radio" name="isExternal" class="peer sr-only">
                                            <div class="w-4 h-4 rounded-full border border-gray-300 peer-checked:border-[#1c7ffd] peer-checked:border-[4px] transition-all bg-white group-hover:border-[#1c7ffd]"></div>
                                        </div>
                                        <span class="text-sm text-[#303133]">否</span>
                                    </label>
                                </div>
                            </div>

                            <!-- 文件上传组 -->
                            <div class="flex items-start mt-2">
                                <label class="w-[160px] text-right shrink-0 text-[#606266] mt-1.5">功能测试报告：</label>
                                <div class="ml-4 flex flex-col gap-3">
                                    <button class="border border-gray-300 rounded px-4 py-1.5 text-sm w-fit hover:border-[#1c7ffd] hover:text-[#1c7ffd] transition-colors bg-white shadow-sm">
                                        <i class="fa-solid fa-arrow-up-from-bracket mr-1"></i> 上传文件
                                    </button>
                                    <span class="text-[#909399] text-[13px]">支持扩展名：.rar, .zip, .doc, .docx，可上传一个，每个文件最大10MB</span>
                                </div>
                            </div>

                            <div class="flex items-start mt-2">
                                <label class="w-[160px] text-right shrink-0 text-[#606266] mt-1.5">安全测试报告：</label>
                                <div class="ml-4 flex flex-col gap-3">
                                    <button class="border border-gray-300 rounded px-4 py-1.5 text-sm w-fit hover:border-[#1c7ffd] hover:text-[#1c7ffd] transition-colors bg-white shadow-sm">
                                        <i class="fa-solid fa-arrow-up-from-bracket mr-1"></i> 上传文件
                                    </button>
                                    <span class="text-[#909399] text-[13px]">支持扩展名：.rar, .zip, .doc, .docx，可上传一个，每个文件最大10MB</span>
                                </div>
                            </div>

                            <div class="flex items-start mt-2">
                                <label class="w-[160px] text-right shrink-0 text-[#606266] mt-1.5">代码包：</label>
                                <div class="ml-4 flex flex-col gap-3">
                                    <button class="border border-gray-300 rounded px-4 py-1.5 text-sm w-fit hover:border-[#1c7ffd] hover:text-[#1c7ffd] transition-colors bg-white shadow-sm">
                                        <i class="fa-solid fa-arrow-up-from-bracket mr-1"></i> 上传文件
                                    </button>
                                    <span class="text-[#909399] text-[13px]">支持扩展名：.rar, .zip，可上传一个，每个文件最大50MB</span>
                                </div>
                            </div>

                            <div class="flex items-start mt-2">
                                <label class="w-[160px] text-right shrink-0 text-[#606266] mt-1.5">其他文件：</label>
                                <div class="ml-4 flex flex-col gap-3">
                                    <button class="border border-gray-300 rounded px-4 py-1.5 text-sm w-fit hover:border-[#1c7ffd] hover:text-[#1c7ffd] transition-colors bg-white shadow-sm">
                                        <i class="fa-solid fa-arrow-up-from-bracket mr-1"></i> 上传文件
                                    </button>
                                    <span class="text-[#909399] text-[13px]">支持扩展名：.rar, .zip, .doc, .docx, .pdf，可上传一个，每个文件最大10MB</span>
                                </div>
                            </div>

                            <div class="flex items-center mt-2">
                                <label class="w-[160px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>联系方式：</label>
                                <div class="ml-4 flex-1 relative">
                                    <input type="text" value="18900000000" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] text-[#303133]">
                                    <i class="fa-solid fa-circle-xmark absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 cursor-pointer hover:text-gray-400 transition-colors"></i>
                                </div>
                            </div>

                            <div class="flex items-center">
                                <label class="w-[160px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>联系人：</label>
                                <div class="ml-4 flex-1 relative">
                                    <input type="text" value="亿云开发者1" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] text-[#303133]">
                                    <i class="fa-solid fa-circle-xmark absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 cursor-pointer hover:text-gray-400 transition-colors"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 h-[64px] px-6 flex items-center justify-end gap-3 bg-white border-t border-gray-200 shadow-[0_-4px_12px_rgba(0,0,0,0.06)] z-20">
                <button class="px-6 py-1.5 border border-gray-300 rounded text-[#606266] hover:text-[#1c7ffd] hover:border-[#1c7ffd] transition-colors text-sm bg-white shadow-sm">暂存</button>
                <a href="model_deploy_add_step2.html" class="px-6 py-1.5 bg-[#1c7ffd] text-white rounded hover:bg-blue-500 transition-colors text-sm shadow-sm inline-block">下一步</a>
            </div>

            <script>
                function onTaskSelected(value) {
                    const imageSelect = document.getElementById('imageSelect');
                    if (value) {
                        imageSelect.disabled = false;
                        imageSelect.classList.remove('bg-gray-50/50');
                        imageSelect.innerHTML = '<option value="">请选择</option><option value="img1">sbhy04201/sbhy04201:1.0</option><option value="img2">zh0319001/zh0319001:1.0</option>';
                    } else {
                        imageSelect.disabled = true;
                        imageSelect.classList.add('bg-gray-50/50');
                        imageSelect.innerHTML = '<option value="">请先选择任务名称</option>';
                    }
                }
            </script>
        </main>
    </div>
</body>
</html>
