<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据沙箱平台 - 已下线模型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden bg-[#f0f2f5] text-[14px] text-gray-700">
    <!-- 顶部导航栏 -->
    <header class="h-14 bg-[#1c7ffd] flex justify-between items-center px-6 text-white shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-cubes-stacked text-2xl"></i>
            <span class="text-lg font-medium tracking-wider ml-1">数据沙箱平台</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="relative cursor-pointer hover:text-gray-200 transition-colors" onclick="window.location.href=\'my_messages.html\'">
                <i class="fa-regular fa-bell text-xl"></i>
                <span class="absolute -top-1.5 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-[#1c7ffd] leading-none">20</span>
            </div>
            <div class="flex items-center gap-2 cursor-pointer hover:text-gray-200 transition-colors">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=yiyun&backgroundColor=b6e3f4" alt="avatar" class="w-8 h-8 rounded-full border border-blue-300 bg-white">
                <span>yiyun</span>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <div class="flex-1 flex overflow-hidden">
<!-- 左侧导航 -->
<aside class="w-[220px] bg-white border-r border-gray-200 shrink-0 overflow-y-auto">
    <div id="developer-side-nav" class="py-4"></div>
</aside>

<script src="./developer_nav.js"></script>

<!-- 右侧内容区 -->
        <main class="flex-1 flex flex-col overflow-hidden relative">
<div id="developer-top-nav" class="h-[52px] bg-white border-b border-gray-200 px-6 flex items-center gap-2 shrink-0 overflow-x-auto"></div>
            <!-- 面包屑 -->
            <div class="h-[52px] flex items-center px-6 text-[#606266] shrink-0 bg-transparent text-sm border-b border-gray-100 bg-white">
                <span>工作台</span>
                <span class="mx-2">/</span>
                <span>模型管理</span>
                <span class="mx-2">/</span>
                <span class="text-[#303133] font-medium">已下线模型</span>
            </div>

            <!-- 核心内容容器 -->
            <div class="flex-1 p-6 flex flex-col gap-4 overflow-y-auto">
                <!-- 搜索区 -->
                <div class="bg-white rounded shadow-sm p-5 flex justify-between items-center shrink-0 border border-gray-100">
                    <div class="flex items-center gap-8">
                        <div class="flex items-center gap-3">
                            <span class="text-[#606266]">模型名称：</span>
                            <input type="text" placeholder="请输入" class="border border-gray-300 rounded px-3 py-1.5 text-sm w-[220px] focus:outline-none focus:border-[#1c7ffd] transition-colors placeholder-gray-300">
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-[#606266]">镜像名称：</span>
                            <input type="text" placeholder="请输入" class="border border-gray-300 rounded px-3 py-1.5 text-sm w-[220px] focus:outline-none focus:border-[#1c7ffd] transition-colors placeholder-gray-300">
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button class="px-4 py-1.5 border border-gray-300 rounded text-[#606266] hover:text-[#1c7ffd] hover:border-[#1c7ffd] transition-colors text-sm flex items-center gap-1.5 bg-white">
                            <i class="fa-solid fa-rotate-right"></i> 重置
                        </button>
                        <button class="px-4 py-1.5 bg-[#1c7ffd] border border-[#1c7ffd] rounded text-white hover:bg-blue-500 transition-colors text-sm flex items-center gap-1.5 shadow-sm">
                            <i class="fa-solid fa-magnifying-glass"></i> 查询
                        </button>
                    </div>
                </div>

                <!-- 列表区 -->
                <div class="bg-white rounded shadow-sm p-5 flex-1 border border-gray-100 flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[16px] font-bold text-[#303133]">已下线模型列表</h3>
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-rotate-right text-gray-400 hover:text-[#1c7ffd] cursor-pointer ml-2"></i>
                            <i class="fa-solid fa-arrows-up-down text-gray-400 hover:text-[#1c7ffd] cursor-pointer"></i>
                            <i class="fa-solid fa-gear text-gray-400 hover:text-[#1c7ffd] cursor-pointer"></i>
                        </div>
                    </div>

                    <!-- 表格 -->
                    <div class="overflow-x-auto flex-1 flex flex-col">
                        <table class="w-full text-left text-[13px] text-[#606266]">
                            <thead class="bg-[#f8f8f9] text-[#909399] font-medium border-b border-gray-200">
                                <tr>
                                    <th class="py-3 px-4 w-16">序号</th>
                                    <th class="py-3 px-4 w-1/3">模型名称</th>
                                    <th class="py-3 px-4 w-1/3">镜像名称</th>
                                    <th class="py-3 px-4">下线时间 <i class="fa-solid fa-sort text-gray-300 ml-1"></i></th>
                                    <th class="py-3 px-4 w-24">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                                    <td class="py-4 px-4">1</td>
                                    <td class="py-4 px-4">测试获取json数据模型-2026022601</td>
                                    <td class="py-4 px-4">myapp1/modeApi:1.0</td>
                                    <td class="py-4 px-4">2026-02-27 16:07:19</td>
                                    <td class="py-4 px-4 text-[#1c7ffd]">
                                        <a href="#" class="hover:underline">查看</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        
                        <!-- 分页 -->
                        <div class="mt-auto pt-4 flex justify-end items-center text-[#606266] text-[13px]">
                            <span class="mr-4">共 1 条</span>
                            <button class="w-8 h-8 rounded border border-gray-200 flex items-center justify-center bg-gray-50 text-gray-400 cursor-not-allowed mx-1">
                                <i class="fa-solid fa-angle-left"></i>
                            </button>
                            <button class="w-8 h-8 rounded border border-[#1c7ffd] flex items-center justify-center bg-[#1c7ffd] text-white mx-1">1</button>
                            <button class="w-8 h-8 rounded border border-gray-200 flex items-center justify-center bg-gray-50 text-gray-400 cursor-not-allowed mx-1">
                                <i class="fa-solid fa-angle-right"></i>
                            </button>
                            <div class="ml-4 relative">
                                <select class="appearance-none border border-gray-200 rounded px-3 py-1.5 pr-8 focus:outline-none focus:border-[#1c7ffd] bg-white cursor-pointer hover:border-gray-300">
                                    <option>10 条/页</option>
                                </select>
                                <i class="fa-solid fa-angle-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-[10px]"></i>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 底部版权信息 -->
                <div class="text-center text-[#1c7ffd] text-xs pb-2 mt-auto">
                    主办单位：山东亿云信息技术有限公司
                </div>
            </div>
        </main>
    </div>
</body>
</html>
