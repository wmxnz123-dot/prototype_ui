<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据沙箱平台 - 配额告警</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden bg-[#f0f2f5] text-[14px] text-gray-700">
    <!-- 顶部导航栏 -->
    <header class="h-14 bg-[#1c7ffd] flex justify-between items-center px-6 text-white shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-cubes-stacked text-2xl"></i>
            <span class="text-lg font-medium tracking-wider ml-1">数据沙箱平台</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="relative cursor-pointer hover:text-gray-200 transition-colors" onclick="window.location.href='my_messages.html'">
                <i class="fa-regular fa-bell text-xl"></i>
                <span class="absolute -top-1.5 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-[#1c7ffd] leading-none">20</span>
            </div>
            <div class="flex items-center gap-2 cursor-pointer hover:text-gray-200 transition-colors">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=yiyun&backgroundColor=b6e3f4" alt="avatar" class="w-8 h-8 rounded-full border border-blue-300 bg-white">
                <span>yiyun</span>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <div class="flex-1 flex overflow-hidden">
        <!-- 左侧导航 -->
        <aside class="w-[220px] bg-white border-r border-gray-200 shrink-0 overflow-y-auto">
            <div id="developer-side-nav" class="py-4"></div>
        </aside>

        <script src="./developer_nav.js"></script>

        <!-- 右侧内容区 -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <div id="developer-top-nav" class="h-[52px] bg-white border-b border-gray-200 px-6 flex items-center gap-2 shrink-0 overflow-x-auto"></div>
            
            <!-- 面包屑 -->
            <div class="h-[52px] flex items-center px-6 text-[#606266] shrink-0 bg-transparent text-sm">
                <span>监控中心</span>
                <span class="mx-2">/</span>
                <span class="text-[#303133] font-medium">配额告警</span>
            </div>

            <!-- 核心内容容器 -->
            <div class="flex-1 px-6 pb-6 flex flex-col gap-4 overflow-y-auto pr-2">
                <!-- 搜索区 -->
                <div class="bg-white rounded-lg shadow-[0_2px_12px_0_rgba(0,0,0,0.05)] p-5 flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-8">
                        <div class="flex items-center gap-3">
                            <span class="text-[#606266]">告警对象：</span>
                            <div class="relative">
                                <select class="border border-gray-300 rounded px-3 py-1.5 text-sm w-[200px] focus:outline-none focus:border-[#1c7ffd] text-gray-700 bg-white appearance-none cursor-pointer transition-colors">
                                    <option value="">请选择</option>
                                    <option value="cpu">CPU</option>
                                    <option value="memory">内存</option>
                                </select>
                                <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-[#606266]">部门名称：</span>
                            <input type="text" placeholder="请输入" class="border border-gray-300 rounded px-3 py-1.5 text-sm w-[200px] focus:outline-none focus:border-[#1c7ffd] transition-colors placeholder-gray-400">
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button class="px-5 py-1.5 border border-gray-300 rounded text-[#606266] hover:text-[#1c7ffd] hover:border-[#1c7ffd] hover:bg-blue-50 transition-colors text-sm flex items-center gap-1.5 bg-white">
                            <i class="fa-solid fa-rotate-right"></i> 重置
                        </button>
                        <button class="px-5 py-1.5 bg-[#1c7ffd] border border-[#1c7ffd] rounded text-white hover:bg-blue-500 transition-colors text-sm flex items-center gap-1.5 shadow-sm">
                            <i class="fa-solid fa-magnifying-glass"></i> 查询
                        </button>
                    </div>
                </div>

                <!-- 列表区 -->
                <div class="bg-white rounded-lg shadow-[0_2px_12px_0_rgba(0,0,0,0.05)] flex-1 flex flex-col p-5">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[16px] font-bold text-[#303133]">配额告警列表</h3>
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-rotate-right text-gray-400 cursor-pointer hover:text-[#1c7ffd] transition-colors"></i>
                            <i class="fa-solid fa-gear text-gray-400 cursor-pointer hover:text-[#1c7ffd] transition-colors"></i>
                        </div>
                    </div>
                    
                    <div class="flex-1 overflow-x-auto">
                        <table class="w-full text-left text-[13px] text-[#606266]">
                            <thead class="bg-[#f8f8f9] text-[#909399] font-medium border-b border-gray-200">
                                <tr>
                                    <th class="py-3 px-4 w-16 text-center">序号</th>
                                    <th class="py-3 px-4">告警对象</th>
                                    <th class="py-3 px-4">告警内容</th>
                                    <th class="py-3 px-4">部门名称</th>
                                    <th class="py-3 px-4 w-48">告警时间<i class="fa-solid fa-sort text-gray-300 ml-1"></i></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                                    <td class="py-4 px-4 text-center">1</td>
                                    <td class="py-4 px-4 font-medium text-[#303133]">CPU</td>
                                    <td class="py-4 px-4 text-[#f56c6c]">CPU使用已超过95%</td>
                                    <td class="py-4 px-4 text-[#303133]">宣传部</td>
                                    <td class="py-4 px-4 text-[#909399]">2026-07-09 11:20:00</td>
                                </tr>
                                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                                    <td class="py-4 px-4 text-center">2</td>
                                    <td class="py-4 px-4 font-medium text-[#303133]">内存</td>
                                    <td class="py-4 px-4 text-[#f56c6c]">内存使用已超过95%</td>
                                    <td class="py-4 px-4 text-[#303133]">全局</td>
                                    <td class="py-4 px-4 text-[#909399]">2026-07-09 08:15:00</td>
                                </tr>
                                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                                    <td class="py-4 px-4 text-center">3</td>
                                    <td class="py-4 px-4 font-medium text-[#303133]">内存</td>
                                    <td class="py-4 px-4 text-[#f56c6c]">内存使用已超过95%</td>
                                    <td class="py-4 px-4 text-[#303133]">财政局</td>
                                    <td class="py-4 px-4 text-[#909399]">2026-07-08 14:30:22</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 分页 -->
                    <div class="flex justify-end items-center mt-4 text-[13px] text-[#606266] gap-2 pt-4 border-t border-gray-100">
                        <span>共 3 条</span>
                        <div class="flex items-center gap-1">
                            <button class="w-8 h-8 flex items-center justify-center border border-gray-200 rounded text-gray-400 hover:border-[#1c7ffd] hover:text-[#1c7ffd] transition-colors"><i class="fa-solid fa-angle-left text-[10px]"></i></button>
                            <button class="w-8 h-8 flex items-center justify-center border border-[#1c7ffd] bg-[#1c7ffd] rounded text-white font-medium">1</button>
                            <button class="w-8 h-8 flex items-center justify-center border border-gray-200 rounded text-gray-400 hover:border-[#1c7ffd] hover:text-[#1c7ffd] transition-colors"><i class="fa-solid fa-angle-right text-[10px]"></i></button>
                        </div>
                        <div class="relative">
                            <select class="h-8 px-3 border border-gray-200 rounded focus:outline-none focus:border-[#1c7ffd] appearance-none pr-6 bg-white transition-colors">
                                <option>10 条/页</option>
                                <option>20 条/页</option>
                                <option>50 条/页</option>
                            </select>
                            <i class="fa-solid fa-angle-down absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 text-[10px] pointer-events-none"></i>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
