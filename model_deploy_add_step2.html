<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据沙箱平台 - 模型注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden bg-[#f0f2f5] text-[14px] text-gray-700">
    <!-- 顶部导航栏 -->
    <header class="h-14 bg-[#1c7ffd] flex justify-between items-center px-6 text-white shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-cubes-stacked text-2xl"></i>
            <span class="text-lg font-medium tracking-wider ml-1">数据沙箱平台</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="relative cursor-pointer hover:text-gray-200 transition-colors" onclick="window.location.href=\'my_messages.html\'">
                <i class="fa-regular fa-bell text-xl"></i>
                <span class="absolute -top-1.5 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-[#1c7ffd] leading-none">20</span>
            </div>
            <div class="flex items-center gap-2 cursor-pointer hover:text-gray-200 transition-colors">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=yiyun&backgroundColor=b6e3f4" alt="avatar" class="w-8 h-8 rounded-full border border-blue-300 bg-white">
                <span>yiyun</span>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <div class="flex-1 flex overflow-hidden">
<!-- 左侧导航 -->
<aside class="w-[220px] bg-white border-r border-gray-200 shrink-0 overflow-y-auto">
    <div id="developer-side-nav" class="py-4"></div>
</aside>

<script src="./developer_nav.js"></script>

<!-- 右侧内容区 -->
        <main class="flex-1 flex flex-col overflow-hidden relative">
<div id="developer-top-nav" class="h-[52px] bg-white border-b border-gray-200 px-6 flex items-center gap-2 shrink-0 overflow-x-auto"></div>
            <!-- 面包屑 -->
            <div class="h-[52px] flex items-center px-6 text-[#606266] shrink-0 bg-transparent text-sm border-b border-gray-100 bg-white">
    <span>数据模型</span>
    <span class="mx-2">/</span>
    <span>模型管理</span>
    <span class="mx-2">/</span>
    <a href="model_deploy_list.html" class="hover:text-[#1c7ffd] transition-colors">模型注册</a>
    <span class="mx-2">/</span>
    <span class="text-[#303133] font-medium">模型注册</span>
</div>

            <!-- 核心内容容器 -->
            <div class="flex-1 p-6 flex flex-col gap-4 overflow-y-auto">
                <div class="bg-white rounded shadow-sm border border-gray-100 flex flex-col h-full">
                    
                    <!-- 步骤条 -->
                    <div class="py-8 px-20 shrink-0">
                        <div class="flex items-center justify-between relative">
                            <!-- 连线 (已完成部分) -->
                            <div class="absolute left-[10%] right-[50%] h-[1px] bg-[#1c7ffd] top-1/2 -translate-y-1/2 z-0"></div>
                            <!-- 连线 (未完成部分) -->
                            <div class="absolute left-[50%] right-[10%] h-[1px] bg-gray-200 top-1/2 -translate-y-1/2 z-0"></div>
                            
                            <!-- 步骤1 (已完成) -->
                            <div class="relative z-10 flex items-center bg-white px-2 cursor-pointer" onclick="window.location.href='model_deploy_add.html'">
                                <div class="w-8 h-8 rounded-full border border-[#1c7ffd] text-[#1c7ffd] bg-white flex items-center justify-center font-bold shadow-sm">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                                <span class="ml-3 text-[#303133] font-medium">模型信息配置</span>
                            </div>

                            <!-- 步骤2 (进行中) -->
                            <div class="relative z-10 flex items-center bg-white px-2">
                                <div class="w-8 h-8 rounded-full bg-[#1c7ffd] text-white flex items-center justify-center font-bold shadow-sm">2</div>
                                <span class="ml-3 text-[#303133] font-medium">接口信息配置</span>
                            </div>

                            <!-- 步骤3 (未开始) -->
                            <div class="relative z-10 flex items-center bg-white px-2">
                                <div class="w-8 h-8 rounded-full border border-gray-300 text-gray-400 bg-white flex items-center justify-center font-bold">3</div>
                                <span class="ml-3 text-gray-400">接口测试</span>
                            </div>
                        </div>
                    </div>

                    <!-- 表单区 (图4、图5) -->
                    <div class="flex-1 overflow-y-auto px-6 pb-6 flex justify-center">
                        <div class="w-full max-w-[850px] flex flex-col gap-6 pt-4">
                            <!-- 接口基本信息配置 -->
                            <div class="flex items-center">
                                <label class="w-[120px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>接口名称：</label>
                                <div class="ml-4 flex-1 relative">
                                    <input type="text" value="ys4201接口" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] text-[#303133]">
                                    <i class="fa-solid fa-circle-xmark absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 cursor-pointer hover:text-gray-400 transition-colors"></i>
                                </div>
                            </div>

                            <div class="flex items-center">
                                <label class="w-[120px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>接口URI：</label>
                                <div class="ml-4 flex-1 relative">
                                    <input type="text" value="/api/credit/score" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] text-[#303133]">
                                    <i class="fa-solid fa-circle-xmark absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 cursor-pointer hover:text-gray-400 transition-colors"></i>
                                </div>
                            </div>

                            <div class="flex items-center">
                                <label class="w-[120px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>接口标识：</label>
                                <div class="ml-4 flex-1 flex">
                                    <div class="px-3 py-2 bg-gray-50 border border-gray-300 border-r-0 rounded-l text-[#909399] text-sm shrink-0">gzmx/</div>
                                    <div class="flex-1 relative">
                                        <input type="text" value="score4201" class="w-full border border-gray-300 rounded-r px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] text-[#303133]">
                                        <i class="fa-solid fa-circle-xmark absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 cursor-pointer hover:text-gray-400 transition-colors"></i>
                                    </div>
                                </div>
                            </div>

                            <div class="flex items-center">
                                <label class="w-[120px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>请求类型：</label>
                                <div class="ml-4 flex gap-6">
                                    <label class="flex items-center cursor-pointer">
                                        <input type="radio" name="request_type" class="mr-2 cursor-pointer w-3.5 h-3.5 text-[#1c7ffd]"> GET
                                    </label>
                                    <label class="flex items-center cursor-pointer text-[#1c7ffd]">
                                        <input type="radio" name="request_type" checked class="mr-2 cursor-pointer w-3.5 h-3.5 text-[#1c7ffd] border-[#1c7ffd] focus:ring-[#1c7ffd]"> POST
                                    </label>
                                </div>
                            </div>

                            <div class="flex items-center">
                                <label class="w-[120px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>返回类型：</label>
                                <div class="ml-4 flex gap-6">
                                    <label class="flex items-center cursor-pointer text-[#1c7ffd]">
                                        <input type="radio" name="return_type" checked class="mr-2 cursor-pointer w-3.5 h-3.5 text-[#1c7ffd] border-[#1c7ffd] focus:ring-[#1c7ffd]"> json
                                    </label>
                                    <label class="flex items-center cursor-pointer">
                                        <input type="radio" name="return_type" class="mr-2 cursor-pointer w-3.5 h-3.5 text-[#1c7ffd]"> xml
                                    </label>
                                </div>
                            </div>

                            <div class="flex items-center">
                                <label class="w-[120px] text-right shrink-0 text-[#606266]"><span class="text-red-500 mr-1">*</span>是否开启心跳：</label>
                                <div class="ml-4 flex gap-6">
                                    <label class="flex items-center cursor-pointer text-[#1c7ffd]">
                                        <input type="radio" name="heartbeat" checked class="mr-2 cursor-pointer w-3.5 h-3.5 text-[#1c7ffd] border-[#1c7ffd] focus:ring-[#1c7ffd]"> 是
                                    </label>
                                    <label class="flex items-center cursor-pointer">
                                        <input type="radio" name="heartbeat" class="mr-2 cursor-pointer w-3.5 h-3.5 text-[#1c7ffd]"> 否
                                    </label>
                                </div>
                            </div>

                            <div class="flex items-start">
                                <label class="w-[120px] text-right shrink-0 text-[#606266] mt-2"><span class="text-red-500 mr-1">*</span>接口描述：</label>
                                <div class="ml-4 flex-1 relative">
                                    <textarea rows="3" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-[#1c7ffd] text-[#303133] resize-none">ys4201接口</textarea>
                                    <i class="fa-solid fa-circle-xmark absolute right-3 top-3 text-gray-300 cursor-pointer hover:text-gray-400 transition-colors"></i>
                                </div>
                            </div>

                            <!-- 分割线 -->
                            <div class="border-b border-gray-100 my-2"></div>

                            <!-- 请求参数 -->
                            <div class="flex flex-col gap-3">
                                <div class="text-[#606266] font-medium"><span class="text-red-500 mr-1">*</span>请求参数</div>
                                <table class="w-full text-center text-[13px] text-[#606266] border-collapse">
                                    <thead class="bg-[#f8f8f9] text-[#909399] font-medium">
                                        <tr>
                                            <th class="py-3 px-4 font-medium border-b border-gray-100">名称</th>
                                            <th class="py-3 px-4 font-medium border-b border-gray-100">描述</th>
                                            <th class="py-3 px-4 font-medium border-b border-gray-100">位置</th>
                                            <th class="py-3 px-4 font-medium border-b border-gray-100">是否必填</th>
                                            <th class="py-3 px-4 font-medium border-b border-gray-100">示例值</th>
                                            <th class="py-3 px-4 font-medium border-b border-gray-100">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr class="border-b border-gray-100">
                                            <td class="py-3 px-4">id_card</td>
                                            <td class="py-3 px-4">身份证号</td>
                                            <td class="py-3 px-4">body</td>
                                            <td class="py-3 px-4">是</td>
                                            <td class="py-3 px-4">610103199501011001</td>
                                            <td class="py-3 px-4 text-[#1c7ffd]">
                                                <a href="#" class="hover:underline">编辑</a>
                                                <a href="#" class="hover:underline ml-2">删除</a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                                <button class="w-full py-2 border border-dashed border-[#1c7ffd] text-[#1c7ffd] rounded hover:bg-blue-50 transition-colors text-sm flex items-center justify-center gap-1 mt-1">
                                    <i class="fa-solid fa-plus text-xs"></i> 添加
                                </button>
                            </div>

                            <!-- 返回参数 -->
                            <div class="flex flex-col gap-3 mt-4">
                                <div class="text-[#606266] font-medium"><span class="text-red-500 mr-1">*</span>返回参数</div>
                                <table class="w-full text-center text-[13px] text-[#606266] border-collapse">
                                    <thead class="bg-[#f8f8f9] text-[#909399] font-medium">
                                        <tr>
                                            <th class="py-3 px-4 font-medium border-b border-gray-100 w-[30%]">名称</th>
                                            <th class="py-3 px-4 font-medium border-b border-gray-100">描述</th>
                                            <th class="py-3 px-4 font-medium border-b border-gray-100 w-[20%]">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr class="border-b border-gray-100">
                                            <td class="py-3 px-4">request_id</td>
                                            <td class="py-3 px-4">请求追踪ID</td>
                                            <td class="py-3 px-4 text-[#1c7ffd]">
                                                <a href="#" class="hover:underline">编辑</a>
                                                <a href="#" class="hover:underline ml-2">删除</a>
                                            </td>
                                        </tr>
                                        <tr class="border-b border-gray-100">
                                            <td class="py-3 px-4">data.grade</td>
                                            <td class="py-3 px-4">信用等级（AAA/AA/A/B/C/D）</td>
                                            <td class="py-3 px-4 text-[#1c7ffd]">
                                                <a href="#" class="hover:underline">编辑</a>
                                                <a href="#" class="hover:underline ml-2">删除</a>
                                            </td>
                                        </tr>
                                        <tr class="border-b border-gray-100">
                                            <td class="py-3 px-4">data.recommend</td>
                                            <td class="py-3 px-4">利率建议</td>
                                            <td class="py-3 px-4 text-[#1c7ffd]">
                                                <a href="#" class="hover:underline">编辑</a>
                                                <a href="#" class="hover:underline ml-2">删除</a>
                                            </td>
                                        </tr>
                                        <tr class="border-b border-gray-100">
                                            <td class="py-3 px-4">data.risk_factors</td>
                                            <td class="py-3 px-4">风险因素列表（无则为空数组）</td>
                                            <td class="py-3 px-4 text-[#1c7ffd]">
                                                <a href="#" class="hover:underline">编辑</a>
                                                <a href="#" class="hover:underline ml-2">删除</a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                                <button class="w-full py-2 border border-dashed border-[#1c7ffd] text-[#1c7ffd] rounded hover:bg-blue-50 transition-colors text-sm flex items-center justify-center gap-1 mt-1 mb-4">
                                    <i class="fa-solid fa-plus text-xs"></i> 添加
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 底部操作按钮 -->
                    <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 shrink-0">
                        <a href="model_deploy_add.html" class="px-6 py-1.5 border border-gray-300 rounded text-[#606266] hover:text-[#1c7ffd] hover:border-[#1c7ffd] transition-colors text-sm bg-white shadow-sm inline-block">上一步</a>
                        <button class="px-6 py-1.5 border border-gray-300 rounded text-[#606266] hover:text-[#1c7ffd] hover:border-[#1c7ffd] transition-colors text-sm bg-white shadow-sm">暂存</button>
                        <a href="model_deploy_add_step3.html" class="px-6 py-1.5 bg-[#1c7ffd] text-white rounded hover:bg-blue-500 transition-colors text-sm shadow-sm inline-block">下一步</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
