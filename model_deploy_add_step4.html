<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据沙箱平台 - 模型注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden bg-[#f0f2f5] text-[14px] text-gray-700">
    <header class="h-14 bg-[#1c7ffd] flex justify-between items-center px-6 text-white shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-cubes-stacked text-2xl"></i>
            <span class="text-lg font-medium tracking-wider ml-1">数据沙箱平台</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="relative cursor-pointer hover:text-gray-200 transition-colors" onclick="window.location.href='my_messages.html'">
                <i class="fa-regular fa-bell text-xl"></i>
                <span class="absolute -top-1.5 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-[#1c7ffd] leading-none">20</span>
            </div>
            <div class="flex items-center gap-2 cursor-pointer hover:text-gray-200 transition-colors">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=yiyun&backgroundColor=b6e3f4" alt="avatar" class="w-8 h-8 rounded-full border border-blue-300 bg-white">
                <span>yiyun</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
<aside class="w-[220px] bg-white border-r border-gray-200 shrink-0 overflow-y-auto">
    <div id="developer-side-nav" class="py-4"></div>
</aside>

<script src="./developer_nav.js"></script>

        <main class="flex-1 flex flex-col overflow-hidden relative">
<div id="developer-top-nav" class="h-[52px] bg-white border-b border-gray-200 px-6 flex items-center gap-2 shrink-0 overflow-x-auto"></div>
            <div class="px-6 py-3 bg-white border-b border-gray-100 flex items-center shrink-0">
                <a href="model_deploy_list.html?nav=model-register" class="text-[#1c7ffd] hover:opacity-80 transition-colors flex items-center gap-1 font-medium text-[15px]">
                    <i class="fa-solid fa-arrow-rotate-left"></i> 返回列表
                </a>
            </div>

            <div class="flex-1 p-6 flex flex-col gap-4 overflow-y-auto pb-[88px]">
                <div class="bg-white rounded shadow-sm border border-gray-100 flex flex-col min-h-full">
                    
                    <div class="py-8 px-10 shrink-0">
                        <div class="flex items-center justify-between relative">
                            <div class="absolute left-[5%] right-[5%] h-[1px] bg-[#1c7ffd] top-1/2 -translate-y-1/2 z-0"></div>
                            
                            <div class="relative z-10 flex items-center bg-white px-2 cursor-pointer" onclick="window.location.href='model_deploy_add.html'">
                                <div class="w-8 h-8 rounded-full border border-[#1c7ffd] text-[#1c7ffd] bg-white flex items-center justify-center font-bold shadow-sm">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                                <span class="ml-3 text-[#303133] font-medium">模型信息配置</span>
                            </div>

                            <div class="relative z-10 flex items-center bg-white px-2 cursor-pointer" onclick="window.location.href='model_deploy_add_step2.html'">
                                <div class="w-8 h-8 rounded-full border border-[#1c7ffd] text-[#1c7ffd] bg-white flex items-center justify-center font-bold shadow-sm">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                                <span class="ml-3 text-[#303133] font-medium">接口信息配置</span>
                            </div>

                            <div class="relative z-10 flex items-center bg-white px-2 cursor-pointer" onclick="window.location.href='model_deploy_add_step3.html'">
                                <div class="w-8 h-8 rounded-full border border-[#1c7ffd] text-[#1c7ffd] bg-white flex items-center justify-center font-bold shadow-sm">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                                <span class="ml-3 text-[#303133] font-medium">模型运行</span>
                            </div>

                            <div class="relative z-10 flex items-center bg-white px-2">
                                <div class="w-8 h-8 rounded-full bg-[#1c7ffd] text-white flex items-center justify-center font-bold shadow-sm">4</div>
                                <span class="ml-3 text-[#303133] font-medium">模型测试</span>
                            </div>
                        </div>
                    </div>

                    <div class="overflow-y-auto px-6 flex-1 flex flex-col pb-6">
                        <div class="flex border-b border-gray-200 mb-4 shrink-0">
                            <div class="px-4 py-2 border-b-2 border-[#1c7ffd] text-[#1c7ffd] font-medium cursor-pointer">Params</div>
                            <div class="px-4 py-2 text-[#909399] hover:text-[#606266] cursor-pointer transition-colors">Header</div>
                            <div class="px-4 py-2 text-[#909399] hover:text-[#606266] cursor-pointer transition-colors">Body</div>
                        </div>

                        <table class="w-full text-left text-[13px] text-[#606266] border-collapse mb-4 shrink-0">
                            <thead class="bg-[#f8f8f9] text-[#303133] font-medium border-b border-gray-100">
                                <tr>
                                    <th class="py-3 px-4 w-[25%] font-medium">参数名</th>
                                    <th class="py-3 px-4 w-[50%] font-medium">参数值</th>
                                    <th class="py-3 px-4 w-[25%] font-medium">描述</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="border-b border-gray-100">
                                    <td class="py-3 px-4 text-[#606266]">param</td>
                                    <td class="py-3 px-4">
                                        <input type="text" value="132456789" class="w-[300px] border border-gray-300 rounded px-3 py-1.5 text-[13px] focus:outline-none focus:border-[#1c7ffd] text-[#303133]">
                                    </td>
                                    <td class="py-3 px-4 text-[#909399]">参数</td>
                                </tr>
                            </tbody>
                        </table>

                        <div class="flex justify-end gap-2 mb-4 shrink-0">
                            <span class="px-3 py-1.5 border border-[#e1f3d8] text-[#67c23a] rounded text-[13px] flex items-center bg-white">
                                测试成功
                            </span>
                            <button class="px-4 py-1.5 bg-[#1c7ffd] text-white rounded hover:bg-blue-500 transition-colors text-[13px] flex items-center gap-1.5 shadow-sm">
                                <i class="fa-solid fa-link text-[10px]"></i> 测试
                            </button>
                        </div>

                        <div class="flex-1 flex flex-col">
                            <div class="text-[#606266] font-medium mb-2">Response:</div>
                            <div class="flex-1 bg-[#f8f9fa] border border-gray-200 rounded p-4 font-mono text-[13px] text-[#909399] whitespace-pre-wrap overflow-y-auto">
{
  "msg": "获取成功",
  "data": "132456789",
  "status": "200"
}
                            </div>
                        </div>
                    </div>

                    <div class="absolute bottom-0 left-0 right-0 h-[64px] px-6 flex items-center justify-end gap-3 bg-white border-t border-gray-200 shadow-[0_-4px_12px_rgba(0,0,0,0.06)] z-20">
                        <a href="model_deploy_add_step3.html" class="px-6 py-1.5 border border-gray-300 rounded text-[#606266] hover:text-[#1c7ffd] hover:border-[#1c7ffd] transition-colors text-sm bg-white shadow-sm inline-block">上一步</a>
                        <button onclick="submitSuccess()" class="px-6 py-1.5 bg-[#1c7ffd] text-white rounded hover:bg-blue-500 transition-colors text-sm shadow-sm">提交</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-[#f0f9eb] border border-[#e1f3d8] text-[#67c23a] px-4 py-2 rounded shadow-sm z-50 flex items-center gap-2 transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none">
        <i class="fa-solid fa-circle-check"></i>
        <span>模型部署申请提交成功</span>
    </div>

    <script>
        function submitSuccess() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', '-translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                window.location.href = 'model_deploy_list.html';
            }, 1500);
        }
    </script>
</body>
</html>
