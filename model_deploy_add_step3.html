<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据沙箱平台 - 模型注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden bg-[#f0f2f5] text-[14px] text-gray-700">
    <!-- 顶部导航栏 -->
    <header class="h-14 bg-[#1c7ffd] flex justify-between items-center px-6 text-white shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-cubes-stacked text-2xl"></i>
            <span class="text-lg font-medium tracking-wider ml-1">数据沙箱平台</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="relative cursor-pointer hover:text-gray-200 transition-colors" onclick="window.location.href=\'my_messages.html\'">
                <i class="fa-regular fa-bell text-xl"></i>
                <span class="absolute -top-1.5 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-[#1c7ffd] leading-none">20</span>
            </div>
            <div class="flex items-center gap-2 cursor-pointer hover:text-gray-200 transition-colors">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=yiyun&backgroundColor=b6e3f4" alt="avatar" class="w-8 h-8 rounded-full border border-blue-300 bg-white">
                <span>yiyun</span>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <div class="flex-1 flex overflow-hidden">
<!-- 左侧导航 -->
<aside class="w-[220px] bg-white border-r border-gray-200 shrink-0 overflow-y-auto">
    <div id="developer-side-nav" class="py-4"></div>
</aside>

<script src="./developer_nav.js"></script>

<!-- 右侧内容区 -->
        <main class="flex-1 flex flex-col overflow-hidden relative">
<div id="developer-top-nav" class="h-[52px] bg-white border-b border-gray-200 px-6 flex items-center gap-2 shrink-0 overflow-x-auto"></div>
            <div class="px-6 py-3 bg-white border-b border-gray-100 flex items-center shrink-0">
                <a href="model_deploy_list.html?nav=model-register" class="text-[#1c7ffd] hover:opacity-80 transition-colors flex items-center gap-1 font-medium text-[15px]">
                    <i class="fa-solid fa-arrow-rotate-left"></i> 返回列表
                </a>
            </div>

            <!-- 核心内容容器 -->
            <div class="flex-1 p-6 flex flex-col gap-4 overflow-y-auto pb-[88px]">
                <div class="bg-white rounded shadow-sm border border-gray-100 flex flex-col min-h-full">
                    
                    <!-- 步骤条 -->
                    <div class="py-8 px-10 shrink-0">
                        <div class="flex items-center justify-between relative">
                            <!-- 连线 (已完成部分) -->
                            <div class="absolute left-[5%] right-[50%] h-[1px] bg-[#1c7ffd] top-1/2 -translate-y-1/2 z-0"></div>
                            <!-- 连线 (未完成部分) -->
                            <div class="absolute left-[50%] right-[5%] h-[1px] bg-gray-200 top-1/2 -translate-y-1/2 z-0"></div>
                            
                            <!-- 步骤1 (已完成) -->
                            <div class="relative z-10 flex items-center bg-white px-2 cursor-pointer" onclick="window.location.href='model_deploy_add.html'">
                                <div class="w-8 h-8 rounded-full border border-[#1c7ffd] text-[#1c7ffd] bg-white flex items-center justify-center font-bold shadow-sm">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                                <span class="ml-3 text-[#303133] font-medium">模型信息配置</span>
                            </div>

                            <!-- 步骤2 (已完成) -->
                            <div class="relative z-10 flex items-center bg-white px-2 cursor-pointer" onclick="window.location.href='model_deploy_add_step2.html'">
                                <div class="w-8 h-8 rounded-full border border-[#1c7ffd] text-[#1c7ffd] bg-white flex items-center justify-center font-bold shadow-sm">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                                <span class="ml-3 text-[#303133] font-medium">接口信息配置</span>
                            </div>

                            <!-- 步骤3 (进行中) -->
                            <div class="relative z-10 flex items-center bg-white px-2">
                                <div class="w-8 h-8 rounded-full bg-[#1c7ffd] text-white flex items-center justify-center font-bold shadow-sm">3</div>
                                <span class="ml-3 text-[#303133] font-medium">模型运行</span>
                            </div>

                            <!-- 步骤4 (未开始) -->
                            <div class="relative z-10 flex items-center bg-white px-2">
                                <div class="w-8 h-8 rounded-full border border-gray-300 text-gray-400 bg-white flex items-center justify-center font-bold">4</div>
                                <span class="ml-3 text-gray-400">模型测试</span>
                            </div>
                        </div>
                    </div>
                    <div class="overflow-y-auto">
                    <!-- 执行按钮与状态展示区 -->
                    <div class="px-6 flex justify-end gap-2 mb-4 shrink-0">
                        <span class="px-3 py-1.5 border border-[#e1f3d8] text-[#67c23a] rounded text-[13px] flex items-center bg-white">
                            运行成功
                        </span>
                        <button class="px-4 py-1.5 bg-[#1c7ffd] text-white rounded hover:bg-blue-500 transition-colors text-[13px] flex items-center gap-1.5 shadow-sm">
                            <i class="fa-regular fa-circle-play text-[10px]"></i> 执行
                        </button>
                    </div>

                    <!-- 信息展示区 (图1) -->
                    <div class="px-6 pb-6 shrink-0 flex flex-col gap-6">
                        <!-- 模型信息 -->
                        <div>
                            <div class="text-[15px] font-bold text-[#303133] mb-4 flex items-center gap-2">
                                <div class="w-1 h-4 bg-[#1c7ffd] rounded-sm"></div>模型信息
                            </div>
                            <div class="grid grid-cols-3 gap-y-4 gap-x-8 pl-3">
                                <div class="flex text-[#606266]"><span class="w-[110px] text-[#909399]">模型名称：</span><span class="flex-1 text-[#303133]">ys4201模型</span></div>
                                <div class="flex text-[#606266]"><span class="w-[110px] text-[#909399]">镜像名称：</span><span class="flex-1 text-[#303133]">ys4201/ys4201:1.0</span></div>
                                <div class="flex text-[#606266]"><span class="w-[110px] text-[#909399]">任务名称：</span><span class="flex-1 text-[#303133]">zh测试任务_0310</span></div>
                                <div class="flex text-[#606266]"><span class="w-[110px] text-[#909399]">cpu限制(Core)：</span><span class="flex-1 text-[#303133]">0.2</span></div>
                                <div class="flex text-[#606266]"><span class="w-[110px] text-[#909399]">cpu预留(Core)：</span><span class="flex-1 text-[#303133]">0.2</span></div>
                                <div class="flex text-[#606266]"><span class="w-[110px] text-[#909399]">内存限制(Mi)：</span><span class="flex-1 text-[#303133]">256</span></div>
                                <div class="flex text-[#606266]"><span class="w-[110px] text-[#909399]">内存预留(Mi)：</span><span class="flex-1 text-[#303133]">256</span></div>
                                <div class="flex text-[#606266]"><span class="w-[110px] text-[#909399]">容器端口号：</span><span class="flex-1 text-[#303133]">8081</span></div>
                            </div>
                        </div>

                        <div class="border-b border-gray-100"></div>

                        <!-- 接口信息 -->
                        <div>
                            <div class="text-[15px] font-bold text-[#303133] mb-4 flex items-center gap-2">
                                <div class="w-1 h-4 bg-[#1c7ffd] rounded-sm"></div>接口信息
                            </div>
                            <div class="grid grid-cols-3 gap-y-4 gap-x-8 pl-3">
                                <div class="flex text-[#606266]"><span class="w-[110px] text-[#909399]">接口名称：</span><span class="flex-1 text-[#303133]">ys4201接口</span></div>
                                <div class="flex text-[#606266]"><span class="w-[110px] text-[#909399]">接口URI：</span><span class="flex-1 text-[#303133]">/api/credit/score</span></div>
                                <div class="flex text-[#606266]"><span class="w-[110px] text-[#909399]">接口标识：</span><span class="flex-1 text-[#303133]">score4201</span></div>
                                <div class="flex text-[#606266]"><span class="w-[110px] text-[#909399]">请求类型：</span><span class="flex-1 text-[#303133]">POST</span></div>
                            </div>
                        </div>
                        
                        <div class="border-b border-gray-100"></div>
                    </div>

                    <!-- 底部操作按钮 -->
                    <div class="absolute bottom-0 left-0 right-0 h-[64px] px-6 flex items-center justify-end gap-3 bg-white border-t border-gray-200 shadow-[0_-4px_12px_rgba(0,0,0,0.06)] z-20">
                        <a href="model_deploy_add_step2.html" class="px-6 py-1.5 border border-gray-300 rounded text-[#606266] hover:text-[#1c7ffd] hover:border-[#1c7ffd] transition-colors text-sm bg-white shadow-sm inline-block">上一步</a>
                        <a href="model_deploy_add_step4.html" class="px-6 py-1.5 bg-[#1c7ffd] text-white rounded hover:bg-blue-500 transition-colors text-sm shadow-sm inline-block">下一步</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
